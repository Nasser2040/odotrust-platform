<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OdoTrust</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#020617;
  color:white;
  font-family:Arial;
}

header{
  text-align:center;
  padding:40px;
  background:#0f172a;
  border-bottom:3px solid #14b8a6;
}

header h1{
  color:#38bdf8;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.card{
  background:#0f172a;
  padding:25px;
  margin-bottom:25px;
  border-radius:20px;
  border:1px solid #1e293b;
}

h2{
  color:#38bdf8;
  text-align:center;
}

input,button{
  width:100%;
  padding:15px;
  margin-top:12px;
  border:none;
  border-radius:12px;
  font-size:16px;
}

input{
  background:#1e293b;
  color:white;
}

button{
  background:#0f766e;
  color:white;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  background:#14b8a6;
}

.info-card{
  background:#111827;
  padding:20px;
  border-radius:16px;
  margin-top:15px;
}

#message,
#authMessage{
  text-align:center;
  font-weight:bold;
  margin-top:15px;
}

footer{
  text-align:center;
  padding:30px;
  color:#94a3b8;
}

</style>
</head>

<body>

<header>
<h1>🚗 OdoTrust</h1>
<p>عداد موثوق لفحص المركبات</p>
</header>

<div class="container">

<div class="card">

<h2>إضافة مركبة</h2>

<input id="vin" placeholder="رقم الشاصي VIN">
<input id="make" placeholder="الشركة">
<input id="model" placeholder="الموديل">
<input id="year" type="number" placeholder="السنة">
<input id="mileage" type="number" placeholder="العداد">

<button onclick="saveVehicle()">
حفظ المركبة
</button>

<p id="message"></p>

</div>

<div class="card">

<h2>تسجيل الدخول</h2>

<input id="email" placeholder="الإيميل أو رقم الجوال">

<input id="password" type="password" placeholder="كلمة المرور">

<button onclick="signUp()">
إنشاء حساب
</button>

<button onclick="signIn()">
تسجيل دخول
</button>

<button onclick="logout()">
تسجيل خروج
</button>

<p id="authMessage"></p>

</div>

<div class="card">

<h2>لوحة المستخدم</h2>

<p id="userStatus">
❌ لا يوجد مستخدم
</p>

<div id="savedCars">
لا توجد مركبات
</div>

</div>

</div>

<footer>
© 2026 OdoTrust
</footer>

<script>

const SUPABASE_URL =
"https://ضع-رابط-مشروعك.supabase.co";

const SUPABASE_KEY =
"sb_publishable_VMe1tBu15thlUKhijxGeiA_M_6rX4fV";

const client =
supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

async function signUp(){

let email =
document.getElementById("email")
.value.trim();

const password =
document.getElementById("password")
.value.trim();

const authMessage =
document.getElementById("authMessage");

if(email.startsWith("05")){

email =
`odotrust.local@${email}`;

}

const { error } =
await client.auth.signUp({

email,
password

});

if(error){

authMessage.innerText =
error.message;

authMessage.style.color =
"#f87171";

}else{

authMessage.innerText =
"تم إنشاء الحساب ✅";

authMessage.style.color =
"#4ade80";

}

}

async function signIn(){

let email =
document.getElementById("email")
.value.trim();

const password =
document.getElementById("password")
.value.trim();

const authMessage =
document.getElementById("authMessage");

if(email.startsWith("05")){

email =
`odotrust.local@${email}`;

}

const { error } =
await client.auth.signInWithPassword({

email,
password

});

if(error){

authMessage.innerText =
error.message;

authMessage.style.color =
"#f87171";

}else{

authMessage.innerText =
"تم تسجيل الدخول ✅";

authMessage.style.color =
"#4ade80";

checkUser();

}

}

async function logout(){

await client.auth.signOut();

document.getElementById("authMessage")
.innerText =
"تم تسجيل الخروج 👋";

checkUser();

}

async function saveVehicle(){

const vin =
document.getElementById("vin")
.value.trim();

const make =
document.getElementById("make")
.value.trim();

const model =
document.getElementById("model")
.value.trim();

const year =
Number(
document.getElementById("year")
.value
);

const mileage =
Number(
document.getElementById("mileage")
.value
);

const message =
document.getElementById("message");

const { data:{ user } } =
await client.auth.getUser();

if(!user){

message.innerText =
"يجب تسجيل الدخول أولاً";

message.style.color =
"#f87171";

return;

}

const { error } =
await client
.from("vehicles")
.insert([{

vin,
make,
model,
year,
mileage,
user_id:user.id

}]);

if(error){

message.innerText =
error.message;

message.style.color =
"#f87171";

}else{

message.innerText =
"تم حفظ المركبة ✅";

message.style.color =
"#4ade80";

checkUser();

}

}

async function deleteCar(id){

const confirmDelete =
confirm("هل تريد حذف المركبة؟");

if(!confirmDelete) return;

await client
.from("vehicles")
.delete()
.eq("id",id);

checkUser();

}

async function editCar(id){

const newMileage =
prompt("أدخل العداد الجديد");

if(!newMileage) return;

await client
.from("vehicles")
.update({

mileage:Number(newMileage)

})
.eq("id",id);

checkUser();

}

async function checkUser(){

const { data:{ user } } =
await client.auth.getUser();

const userStatus =
document.getElementById("userStatus");

const savedCars =
document.getElementById("savedCars");

if(user){

userStatus.innerHTML =
"✅ مسجل دخول: " + user.email;

const { data:cars } =
await client
.from("vehicles")
.select("*")
.eq("user_id",user.id)
.order("id",{ascending:false});

if(!cars || cars.length===0){

savedCars.innerHTML =
"لا توجد مركبات";

return;

}

let html = "";

cars.forEach(car=>{

html += `

<div class="info-card">

<p>🚗 ${car.make} ${car.model}</p>

<p>📅 ${car.year}</p>

<p>📍 ${car.vin}</p>

<p>📊 ${car.mileage} كم</p>

<button onclick="editCar(${car.id})">
تعديل المركبة
</button>

<button onclick="deleteCar(${car.id})">
حذف المركبة
</button>

</div>

`;

});

savedCars.innerHTML = html;

}else{

userStatus.innerHTML =
"❌ لا يوجد مستخدم";

savedCars.innerHTML =
"لا توجد مركبات";

}

}

checkUser();

</script>

</body>
</html>
