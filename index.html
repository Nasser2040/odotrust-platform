
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>OdoTrust | عداد موثوق</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f4f8fb;
      margin:0;
      color:#0f172a;
    }

    header{
      background:#0b1f3a;
      color:white;
      padding:25px;
      text-align:center;
    }

    header span{
      color:#38bdf8;
    }

    .container{
      max-width:600px;
      margin:50px auto;
      background:white;
      padding:30px;
      border-radius:16px;
      box-shadow:0 8px 25px rgba(0,0,0,0.08);
    }

    h1,h2{
      text-align:center;
    }

    input,button{
      width:100%;
      padding:14px;
      margin:10px 0;
      border-radius:8px;
      border:1px solid #ddd;
      font-size:16px;
    }

    button{
      background:#0f766e;
      color:white;
      font-weight:bold;
      cursor:pointer;
    }

    button:hover{
      background:#115e59;
    }

    #message{
      text-align:center;
      margin-top:15px;
      font-weight:bold;
    }
  </style>
</head>

<body>

<header>
  <h1>Odo<span>Trust</span> | عداد موثوق</h1>
  <p>منصة ذكية لحفظ وفحص بيانات المركبات</p>
</header>

<div class="container">

  <h2>إضافة مركبة جديدة</h2>

  <input id="vin" placeholder="رقم الشاصي VIN">

  <input id="make" placeholder="الشركة مثل Toyota">

  <input id="model" placeholder="الموديل مثل Camry">

  <input id="year" type="number" placeholder="سنة الصنع مثل 2022">

  <input id="mileage" type="number" placeholder="قراءة العداد مثل 85000">

  <button onclick="saveVehicle()">
    حفظ المركبة
  </button>

  <p id="message"></p>

</div>

<script>

const SUPABASE_URL = "https://fufghmrctxaiwnchgatp.supabase.co/rest/v1/";

const SUPABASE_KEY = "sb_publishable_VMe1tBu15thlUKhijxGeiA_M_6rX4fV";

const client = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

async function saveVehicle(){

  const vin = document.getElementById("vin").value;

  const make = document.getElementById("make").value;

  const model = document.getElementById("model").value;

  const year = Number(
    document.getElementById("year").value
  );

  const mileage = Number(
    document.getElementById("mileage").value
  );

  const { error } = await client
    .from("vehicles")
    .insert([
      {
        vin,
        make,
        model,
        year,
        mileage
      }
    ]);

  const message =
    document.getElementById("message");

  if(error){

    message.style.color = "red";

    message.innerText =
      "حدث خطأ: " + error.message;

  }else{

    message.style.color = "green";

    message.innerText =
      "تم حفظ المركبة بنجاح ✅";

  }

}

</script>

</body>
</html>
