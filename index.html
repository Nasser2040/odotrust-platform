<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OdoTrust | عداد موثوق</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#0f172a;color:white}
header{background:linear-gradient(135deg,#020617,#0f766e);padding:45px;text-align:center;border-bottom:4px solid #38bdf8}
.logo{width:150px;margin-bottom:15px}
.container{max-width:950px;margin:auto;padding:30px}
.card,.result-box,.info-card{background:#111827;padding:25px;border-radius:20px;margin-bottom:25px;border:1px solid #334155}
h1,h2{color:#38bdf8;text-align:center}
input,button{width:100%;padding:15px;margin-top:12px;border-radius:12px;border:none;font-size:16px}
input{background:#1e293b;color:white}
button{background:#0f766e;color:white;font-weight:bold;cursor:pointer}
button:hover{background:#14b8a6}
.warning{background:#7f1d1d;color:#fecaca;padding:15px;border-radius:12px;text-align:center}
.safe{background:#14532d;color:#bbf7d0;padding:15px;border-radius:12px;text-align:center}
.qr{background:white;padding:10px;border-radius:12px}
footer{text-align:center;color:#94a3b8;padding:25px}
</style>
</head>

<body>

<header>
<img src="logo.png" class="logo">
<h1>عداد موثوق | OdoTrust</h1>
<p>منصة ذكية لفحص المركبات وكشف التلاعب بالعداد</p>
</header>

<div class="container">

<div class="card">
<h2>تسجيل الدخول</h2>
<input id="email" placeholder="البريد الإلكتروني أو رقم الجوال">
<input id="password" type="password" placeholder="كلمة المرور">
<button onclick="signUp()">إنشاء حساب</button>
<button onclick="signIn()">تسجيل دخول</button>
<button onclick="logout()">تسجيل خروج</button>
<p id="authMessage"></p>
</div>

<div class="card">
<h2>إضافة مركبة</h2>
<input id="vin" placeholder="رقم الشاصي VIN">
<input id="make" placeholder="الشركة">
<input id="model" placeholder="الموديل">
<input id="year" type="number" placeholder="السنة">
<input id="mileage" type="number" placeholder="العداد">
<button onclick="saveVehicle()">حفظ المركبة</button>
<p id="message"></p>
</div>

<div class="card">
<h2>البحث عن مركبة</h2>
<input id="searchVin" placeholder="أدخل رقم الشاصي VIN">
<button onclick="searchVehicle()">بحث عن المركبة</button>
<div id="result"></div>
<button onclick="downloadPDF()">تحميل تقرير PDF</button>
</div>

<div class="card">
<h2>لوحة المستخدم</h2>
<p id="userStatus">❌ لا يوجد مستخدم مسجل دخول</p>
<div id="savedCars">لا توجد مركبات</div>
</div>

</div>

<footer>© 2026 OdoTrust | عداد موثوق</footer>

<script>
const SUPABASE_URL = "https://fufghmrctxaiwnchgatp.supabase.co";
const SUPABASE_KEY = "sb_publishable_VMe1tBu15thlUKhijxGeiA_M_6rX4fV";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function normalizeLogin(value){
  value = value.trim();
  if(!value.includes("@")){
    return value + "@odotrust.local";
  }
  return value;
}

async function signUp(){
  const email = normalizeLogin(document.getElementById("email").value);
  const password = document.getElementById("password").value.trim();
  const msg = document.getElementById("authMessage");

  if(!email || !password){
    msg.innerText = "اكتب البريد أو الجوال وكلمة المرور";
    msg.style.color = "#f87171";
    return;
  }

  const { error } = await client.auth.signUp({ email, password });

  if(error){
    msg.innerText = error.message;
    msg.style.color = "#f87171";
  }else{
    msg.innerText = "تم إنشاء الحساب بنجاح ✅";
    msg.style.color = "#4ade80";
  }
}

async function signIn(){
  const email = normalizeLogin(document.getElementById("email").value);
  const password = document.getElementById("password").value.trim();
  const msg = document.getElementById("authMessage");

  const { error } = await client.auth.signInWithPassword({ email, password });

  if(error){
    msg.innerText = error.message;
    msg.style.color = "#f87171";
  }else{
    msg.innerText = "تم تسجيل الدخول ✅";
    msg.style.color = "#4ade80";
    checkUser();
  }
}

async function logout(){
  await client.auth.signOut();
  document.getElementById("authMessage").innerText = "تم تسجيل الخروج 👋";
  checkUser();
}

async function saveVehicle(){
  const vin = document.getElementById("vin").value.trim();
  const make = document.getElementById("make").value.trim();
  const model = document.getElementById("model").value.trim();
  const year = Number(document.getElementById("year").value);
  const mileage = Number(document.getElementById("mileage").value);
  const message = document.getElementById("message");

  const { data:{user} } = await client.auth.getUser();

  if(!user){
    message.innerText = "يجب تسجيل الدخول أولاً";
    message.style.color = "#f87171";
    return;
  }

  const { error } = await client
    .from("vehicles")
    .insert([{vin,make,model,year,mileage,user_id:user.id}]);

  const { error: historyError } = await client
    .from("mileage_history")
    .insert([{vin,mileage}]);

  if(error || historyError){
    message.innerText = error?.message || historyError?.message;
    message.style.color = "#f87171";
  }else{
    message.innerText = "تم حفظ المركبة بنجاح ✅";
    message.style.color = "#4ade80";
    checkUser();
  }
}

async function searchVehicle(){
  const searchVin = document.getElementById("searchVin").value.trim();
  const result = document.getElementById("result");

  const { data, error } = await client
    .from("vehicles")
    .select("*")
    .eq("vin", searchVin)
    .limit(1);

  if(error || !data || data.length === 0){
    result.innerHTML = "لا توجد مركبة بهذا الرقم";
    return;
  }

  const car = data[0];

  const { data: historyData } = await client
    .from("mileage_history")
    .select("*")
    .eq("vin", searchVin)
    .order("created_at",{ascending:false});

  const readings = (historyData || []).map(x=>Number(x.mileage)).filter(x=>x>0);

 let tampering = false;

for(let i=0;i<readings.length-1;i++){

  const difference =
    Math.abs(readings[i] - readings[i+1]);

  if(difference > 1000){

    tampering = true;

  }

}

  let historyHtml = "<h3>سجل العدادات</h3>";
  (historyData || []).forEach(item=>{
    historyHtml += `<p>${item.mileage} كم</p>`;
  });

  result.innerHTML = `
    <div class="result-box">
      <h2>🚗 نتيجة الفحص</h2>
      <p><strong>VIN:</strong> ${car.vin}</p>
      <p><strong>الشركة:</strong> ${car.make}</p>
      <p><strong>الموديل:</strong> ${car.model}</p>
      <p><strong>السنة:</strong> ${car.year}</p>
      <p><strong>العداد:</strong> ${car.mileage} كم</p>
      ${historyHtml}
      ${tampering ? '<div class="warning">⚠️ يوجد اشتباه تلاعب بالعداد</div>' : '<div class="safe">✅ لا يوجد اشتباه واضح</div>'}
      <div style="text-align:center;margin-top:20px;">
        <img class="qr" src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${searchVin}">
        <p>QR للتحقق من المركبة</p>
      </div>
    </div>
  `;
}

async function downloadPDF(){
  const vin = document.getElementById("searchVin").value.trim();

  const { data } = await client
    .from("vehicles")
    .select("*")
    .eq("vin", vin)
    .limit(1);

  if(!data || data.length === 0){
    alert("ابحث عن مركبة أولاً");
    return;
  }

  const car = data[0];
  const w = window.open("", "_blank");

  w.document.write(`
    <html>
    <body style="font-family:Arial;padding:40px;">
      <center>
        <img src="logo.png" width="120">
        <h1>OdoTrust Vehicle Report</h1>
      </center>
      <hr>
      <h3>VIN: ${car.vin}</h3>
      <h3>Make: ${car.make}</h3>
      <h3>Model: ${car.model}</h3>
      <h3>Year: ${car.year}</h3>
      <h3>Mileage: ${car.mileage} KM</h3>
      <h2 style="color:#15803d;">Status: Vehicle Verification Report</h2>
    </body>
    </html>
  `);

  w.print();
}

async function checkUser(){
  const { data:{user} } = await client.auth.getUser();
  const userStatus = document.getElementById("userStatus");
  const savedCars = document.getElementById("savedCars");

  if(!user){
    userStatus.innerHTML = "❌ لا يوجد مستخدم مسجل دخول";
    savedCars.innerHTML = "لا توجد مركبات";
    return;
  }

  userStatus.innerHTML = "✅ مسجل دخول: " + user.email;

  const { data: cars } = await client
    .from("vehicles")
    .select("*")
    .eq("user_id", user.id)
    .order("id",{ascending:false});

  if(!cars || cars.length === 0){
    savedCars.innerHTML = "لا توجد مركبات";
    return;
  }

  let html = "";
  cars.forEach(car=>{
    html += `
      <div class="info-card">
        <p>🚗 ${car.make} ${car.model}</p>
        <p>📅 ${car.year}</p>
        <p>📍 ${car.vin}</p>
        <p>📊 ${car.mileage} كم</p>
        <button onclick="editCar(${car.id})">تعديل المركبة</button>
        <button onclick="deleteCar(${car.id})">حذف المركبة</button>
      </div>
    `;
  });

  savedCars.innerHTML = html;
}

async function editCar(id){
  const newMileage = prompt("أدخل العداد الجديد");
  if(!newMileage) return;

  const { error } = await client
    .from("vehicles")
    .update({mileage:Number(newMileage)})
    .eq("id",id);

  if(error){
    alert("حدث خطأ أثناء التعديل");
  }else{
    alert("تم تعديل المركبة ✅");
    checkUser();
  }
}

async function deleteCar(id){
  const ok = confirm("هل تريد حذف المركبة؟");
  if(!ok) return;

  const { error } = await client
    .from("vehicles")
    .delete()
    .eq("id",id);

  if(error){
    alert("حدث خطأ أثناء الحذف");
  }else{
    alert("تم حذف المركبة ✅");
    checkUser();
  }
}

checkUser();
</script>

</body>
</html>
