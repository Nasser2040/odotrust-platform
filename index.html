<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OdoTrust | عداد موثوق</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
 .hero{
  position:relative;
  text-align:center;
  padding:90px 20px;
  overflow:hidden;
  background:
  linear-gradient(
    135deg,
    #020617,
    #0f172a,
    #0f766e
  );
}

.overlay{
  position:absolute;
  inset:0;
  background:
  radial-gradient(
    circle at top,
    rgba(56,189,248,.15),
    transparent 60%
  );
}

.hero-content{
  position:relative;
  z-index:2;
}

.logo{
  width:150px;
  margin-bottom:20px;
  filter:
  drop-shadow(0 0 20px rgba(56,189,248,.5));
}

.hero h1{
  font-size:55px;
  margin:0;
  color:#38bdf8;
}

.hero h3{
  font-size:28px;
  color:white;
  margin-top:15px;
}

.hero p{
  color:#cbd5e1;
  font-size:18px;
  max-width:700px;
  margin:20px auto;
  line-height:1.8;
}

.hero-btn{
  width:auto;
  padding:16px 35px;
  background:#38bdf8;
  color:#020617;
  font-size:18px;
  border-radius:16px;
  border:none;
  cursor:pointer;
  transition:.3s;
  font-weight:bold;
}

.hero-btn:hover{
  transform:scale(1.05);
  background:white;
} 

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial;
  background:#020617;
  color:white;
}

header{
  background:linear-gradient(135deg,#020617,#0f766e);
  padding:45px;
  text-align:center;
  border-bottom:3px solid #38bdf8;
}

.logo{
  width:140px;
  margin-bottom:15px;
}

.container{
  max-width:950px;
  margin:auto;
  padding:25px;
}
.card{
  position:relative;
  background:
  rgba(15,23,42,.75);

  backdrop-filter:
  blur(18px);

  border:
  1px solid rgba(255,255,255,.08);

  padding:30px;

  border-radius:28px;

  margin-bottom:30px;

  box-shadow:
  0 10px 40px rgba(0,0,0,.35);

  overflow:hidden;

  transition:.35s;
}

.card::before{
  content:"";

  position:absolute;

  inset:0;

  background:
  linear-gradient(
    135deg,
    rgba(56,189,248,.08),
    transparent
  );

  pointer-events:none;
}

.card:hover{

  transform:
  translateY(-6px);

  border-color:
  rgba(56,189,248,.4);

  box-shadow:
  0 20px 60px rgba(56,189,248,.15);

}

}

h1,h2{
  color:#38bdf8;
  text-align:center;
}

input,button{
  width:100%;
  padding:15px;
  margin-top:12px;
  border:none;
  border-radius:12px;
  font-size:16px;
}

input{
  background:#1e293b;
  color:white;
}

button{
  background:#0f766e;
  color:white;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  background:#14b8a6;
}
.info-card{
  background:
  linear-gradient(
    135deg,
    rgba(15,23,42,.95),
    rgba(30,41,59,.9)
  );

  border:
  1px solid rgba(56,189,248,.15);

  border-radius:24px;

  padding:24px;

  margin-top:20px;

  transition:.35s;

  box-shadow:
  0 10px 35px rgba(0,0,0,.25);
}

.info-card:hover{

  transform:
  translateY(-5px);

  border-color:
  rgba(56,189,248,.4);

  box-shadow:
  0 18px 55px rgba(56,189,248,.18);

}
}

.warning{
  background:#7f1d1d;
  color:#fecaca;
  padding:15px;
  border-radius:12px;
  text-align:center;
  margin-top:15px;
}

.safe{
  background:#14532d;
  color:#bbf7d0;
  padding:15px;
  border-radius:12px;
  text-align:center;
  margin-top:15px;
}

#message,
#authMessage{
  text-align:center;
  font-weight:bold;
  margin-top:15px;
}

footer{
  text-align:center;
  color:#94a3b8;
  padding:25px;
}

</style>
</head>

<body>

<header class="hero">

<div class="overlay"></div>

<div class="hero-content">

<img src="logo.png" class="logo">

<h1>
🚗 OdoTrust
</h1>

<h3>
عداد موثوق لفحص المركبات وكشف التلاعب بالعداد
</h3>

<p>
منصة ذكية تساعدك على معرفة تاريخ المركبة الحقيقي قبل الشراء
</p>

<button class="hero-btn">
ابدأ الفحص الآن
</button>

</div>

</header>

<div class="container">

<div class="card">

<h2>تسجيل الدخول</h2>

<input id="email" placeholder="البريد الإلكتروني أو رقم الجوال">

<input id="password" type="password" placeholder="كلمة المرور">

<button onclick="signUp()">
إنشاء حساب
</button>

<button onclick="signIn()">
تسجيل دخول
</button>

<button onclick="logout()">
تسجيل خروج
</button>

<p id="authMessage"></p>

</div>

<div class="card">

<h2>إضافة مركبة</h2>

<input id="vin" placeholder="رقم الشاصي VIN">

<input id="make" placeholder="الشركة">

<input id="model" placeholder="الموديل">

<input id="year" type="number" placeholder="السنة">

<input id="mileage" type="number" placeholder="العداد">
<input
id="image"
type="file"
accept="image/*">
<button onclick="saveVehicle()">
حفظ المركبة
</button>

<p id="message"></p>

</div>

<div class="card">

<h2>البحث عن مركبة</h2>

<input id="searchVin" placeholder="أدخل رقم الشاصي VIN">

<button onclick="searchVehicle()">
بحث عن المركبة
</button>

<div id="result"></div>

<button onclick="downloadPDF()">
تحميل تقرير PDF
</button>

</div>

<div class="card">

<h2>لوحة المستخدم</h2>

<p id="userStatus">
❌ لا يوجد مستخدم مسجل دخول
</p>

<div id="savedCars">
لا توجد مركبات
</div>

</div>

</div>

<footer>
© 2026 OdoTrust
</footer>

<script>

const SUPABASE_URL =
"https://fufghmrctxaiwnchgatp.supabase.co";

const SUPABASE_KEY =
"sb_publishable_VMe1tBu15thlUKhijxGeiA_M_6rX4fV";

const client =
supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

function normalizeLogin(value){

value = value.trim();

if(!value.includes("@")){

return value + "@odotrust.local";

}

return value;

}

async function signUp(){

const email =
normalizeLogin(
document.getElementById("email").value
);

const password =
document.getElementById("password").value;

const authMessage =
document.getElementById("authMessage");

const { error } =
await client.auth.signUp({

email,
password

});

if(error){

authMessage.innerText =
error.message;

authMessage.style.color =
"#f87171";

}else{

authMessage.innerText =
"تم إنشاء الحساب ✅";

authMessage.style.color =
"#4ade80";

}

}

async function signIn(){

const email =
normalizeLogin(
document.getElementById("email").value
);

const password =
document.getElementById("password").value;

const authMessage =
document.getElementById("authMessage");

const { error } =
await client.auth.signInWithPassword({

email,
password

});

if(error){

authMessage.innerText =
error.message;

authMessage.style.color =
"#f87171";

}else{

authMessage.innerText =
"تم تسجيل الدخول ✅";

authMessage.style.color =
"#4ade80";

checkUser();

}

}

async function logout(){

await client.auth.signOut();

document.getElementById("authMessage")
.innerText =
"تم تسجيل الخروج 👋";

checkUser();

}

async function saveVehicle(){

const vin =
document.getElementById("vin").value.trim();

const make =
document.getElementById("make").value.trim();

const model =
document.getElementById("model").value.trim();
const imageFile =
document.getElementById("image").files[0];
const year =
Number(
document.getElementById("year").value
);

const mileage =
Number(
document.getElementById("mileage").value
);

const message =
document.getElementById("message");

 let imageUrl = "";

if(imageFile){

const fileExt =
imageFile.name.split(".").pop();

const fileName =
Date.now() + "." + fileExt;

await client.storage
.from("cars")
.upload(fileName,imageFile);

const { data } =
client.storage
.from("cars")
.getPublicUrl(fileName);

imageUrl = data.publicUrl;

}
const { data:{ user } } =
await client.auth.getUser();

if(!user){

message.innerText =
"يجب تسجيل الدخول أولاً";

message.style.color =
"#f87171";

return;

}

const { error } =
await client
.from("vehicles")
.insert([{

vin,
make,
model,
year,
mileage,
user_id:user.id,
image_url:imageUrl
}]);

await client
.from("mileage_history")
.insert([{

vin,
mileage

}]);

if(error){

message.innerText =
error.message;

message.style.color =
"#f87171";

}else{

message.innerText =
"تم حفظ المركبة ✅";

message.style.color =
"#4ade80";

checkUser();

}

}

async function searchVehicle(){

const searchVin =
document.getElementById("searchVin")
.value.trim();

const result =
document.getElementById("result");

const { data,error } =
await client
.from("vehicles")
.select("*")
.eq("vin",searchVin)
.limit(1);

if(error || !data || data.length===0){

result.innerHTML =
"لا توجد مركبة";

return;

}

const car = data[0];

const { data: historyData } =
await client
.from("mileage_history")
.select("*")
.eq("vin",searchVin)
.order("created_at",{ascending:false});

const readings =
(historyData || [])
.map(x=>Number(x.mileage))
.filter(x=>x>0);

let tampering = false;

for(let i=0;i<readings.length-1;i++){

const difference =
Math.abs(
readings[i] - readings[i+1]
);

if(difference > 1000){

tampering = true;

}

}

let historyHtml =
"<h3>سجل العدادات</h3>";

(historyData || []).forEach(item=>{

historyHtml +=
`<p>${item.mileage} كم</p>`;

});

result.innerHTML = `

<div class="info-card">

<h2>🚗 نتيجة الفحص</h2>

<p>VIN: ${car.vin}</p>

<p>الشركة: ${car.make}</p>

<p>الموديل: ${car.model}</p>

<p>السنة: ${car.year}</p>

<p>العداد: ${car.mileage} كم</p>

${historyHtml}

${tampering ?

'<div class="warning">⚠️ يوجد اشتباه تلاعب بالعداد</div>'

:

'<div class="safe">✅ لا يوجد اشتباه واضح</div>'

}

</div>

`;

}

async function downloadPDF(){

const vin =
document.getElementById("searchVin")
.value.trim();

const { data } =
await client
.from("vehicles")
.select("*")
.eq("vin",vin)
.limit(1);

if(!data || data.length===0){

alert("ابحث عن مركبة أولاً");

return;

}

const car = data[0];

const { data: historyData } =
await client
.from("mileage_history")
.select("*")
.eq("vin",vin)
.order("created_at",{ascending:false});

const readings =
(historyData || [])
.map(x=>Number(x.mileage))
.filter(x=>x>0);

let tampering = false;

for(let i=0;i<readings.length-1;i++){

const difference =
Math.abs(
readings[i] - readings[i+1]
);

if(difference > 1000){

tampering = true;

}

}

const w =
window.open("","_blank");

w.document.write(`

<html>

<body style="font-family:Arial;padding:40px;">

<center>

<img src="logo.png" width="120">

<h1>OdoTrust Vehicle Report</h1>

</center>

<hr>

<h3>VIN: ${car.vin}</h3>

<h3>Make: ${car.make}</h3>

<h3>Model: ${car.model}</h3>

<h3>Year: ${car.year}</h3>

<h3>Mileage: ${car.mileage} KM</h3>

${tampering ?

'<h2 style="color:#b91c1c;">Status: Odometer Tampering Suspected</h2>'

:

'<h2 style="color:#15803d;">Status: No Clear Tampering Detected</h2>'

}

</body>

</html>

`);

w.print();

}

async function editCar(id){

const newMileage =
prompt("أدخل العداد الجديد");

if(!newMileage) return;

await client
.from("vehicles")
.update({

mileage:Number(newMileage)

})
.eq("id",id);

checkUser();

}

async function deleteCar(id){

const ok =
confirm("هل تريد حذف المركبة؟");

if(!ok) return;

await client
.from("vehicles")
.delete()
.eq("id",id);

checkUser();

}

async function checkUser(){

const { data:{ user } } =
await client.auth.getUser();

const userStatus =
document.getElementById("userStatus");

const savedCars =
document.getElementById("savedCars");

if(!user){

userStatus.innerHTML =
"❌ لا يوجد مستخدم مسجل دخول";

savedCars.innerHTML =
"لا توجد مركبات";

return;

}

userStatus.innerHTML =
"✅ مسجل دخول: " + user.email;

const { data: cars } =
await client
.from("vehicles")
.select("*")
.eq("user_id",user.id)
.order("id",{ascending:false});

if(!cars || cars.length===0){

savedCars.innerHTML =
"لا توجد مركبات";

return;

}

let html = "";

cars.forEach(car=>{

html += `

<div class="info-card">
<img
<img
src="${car.image_url || 'https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=1200&auto=format&fit=crop'}"style="
width:100%;
height:220px;
object-fit:cover;
border-radius:18px;
margin-bottom:15px;
">
<p>🚗 ${car.make} ${car.model}</p>

<p>📅 ${car.year}</p>

<p>📍 ${car.vin}</p>

<p>📊 ${car.mileage} كم</p>

<button onclick="editCar(${car.id})">
تعديل المركبة
</button>

<button onclick="deleteCar(${car.id})">
حذف المركبة
</button>

</div>

`;

});

savedCars.innerHTML = html;

}

checkUser();

</script>

</body>
</html>
