<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OdoTrust | عداد موثوق</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{margin:0;font-family:Arial;background:#eef4f8;color:#0f172a}
header{background:linear-gradient(135deg,#0b1f3a,#0f766e);color:white;padding:45px 20px;text-align:center}
header h1{font-size:38px;margin:0}
header span{color:#38bdf8}
header p{font-size:18px;margin-top:12px}
.container{max-width:850px;margin:35px auto;padding:20px}
.card{background:white;padding:28px;border-radius:18px;margin-bottom:25px;box-shadow:0 8px 25px rgba(0,0,0,.08)}
h2{text-align:center;color:#0b1f3a}
input,button{width:100%;padding:15px;margin-top:13px;border-radius:10px;border:1px solid #cbd5e1;font-size:16px;box-sizing:border-box}
button{background:#0f766e;color:white;border:none;font-weight:bold;cursor:pointer}
button:hover{background:#115e59}
#message{font-weight:bold;text-align:center}
#result{margin-top:20px;padding:20px;background:#f8fafc;border-radius:12px}
.warning{color:#dc2626;font-weight:bold;font-size:18px;background:#fee2e2;padding:12px;border-radius:10px}
.good{color:#15803d;font-weight:bold;background:#dcfce7;padding:12px;border-radius:10px}
footer{text-align:center;padding:25px;color:#64748b}
</style>
</head>

<body>

<header>
<h1>عداد موثوق | <span>OdoTrust</span></h1>
<p>منصة ذكية لحفظ وفحص بيانات المركبات وكشف التلاعب بالعداد</p>
</header>

<div class="container">

<div class="card">
<h2>إضافة مركبة جديدة</h2>
<input id="vin" placeholder="رقم الشاصي VIN">
<input id="make" placeholder="الشركة مثل Toyota">
<input id="model" placeholder="الموديل مثل Camry">
<input id="year" type="number" placeholder="سنة الصنع مثل 2022">
<input id="mileage" type="number" placeholder="قراءة العداد مثل 85000">
<button onclick="saveVehicle()">حفظ المركبة</button>
<p id="message"></p>
</div>

<div class="card">
<h2>البحث عن مركبة</h2>
<input id="searchVin" placeholder="أدخل رقم الشاصي VIN">
<button onclick="searchVehicle()">بحث عن المركبة</button>
<div id="result"></div>
</div>

</div>

<footer>
© 2026 OdoTrust | عداد موثوق
</footer>

<script>
const SUPABASE_URL = "https://fufghmrctxaiwnchgatp.supabase.co";
const SUPABASE_KEY = "sb_publishable_VMe1tBu15thlUKhijxGeiA_M_6rX4fV";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
async function saveVehicle(){
  const vin = document.getElementById("vin").value.trim();
  const make = document.getElementById("make").value.trim();
  const model = document.getElementById("model").value.trim();
  const year = Number(document.getElementById("year").value);
  const mileage = Number(document.getElementById("mileage").value);
  const message = document.getElementById("message");

  const { error } = await client
    .from("vehicles")
    .insert([{ vin, make, model, year, mileage }]);

  const { error: historyError } = await client
    .from("mileage_history")
    .insert([{ vin, mileage }]);

  if(error || historyError){
    message.style.color = "red";
    message.innerText = "حدث خطأ أثناء الحفظ";
  }else{
    message.style.color = "green";
    message.innerText = "تم حفظ المركبة بنجاح ✅";
  }
}

async function searchVehicle(){
  const searchVin = document.getElementById("searchVin").value.trim();
  const result = document.getElementById("result");

  const { data, error } = await client
    .from("vehicles")
    .select("*")
    .eq("vin", searchVin)
    .limit(1);

  if(error){
    result.innerHTML = "حدث خطأ أثناء البحث";
    return;
  }

  if(!data || data.length === 0){
    result.innerHTML = "لا توجد مركبة بهذا الرقم";
    return;
  }

  const car = data[0];

  const { data: historyData } = await client
    .from("mileage_history")
    .select("*")
    .eq("vin", searchVin)
    .order("created_at", { ascending: false });

  let readings = (historyData || [])
    .map(item => Number(item.mileage))
    .filter(num => num > 0);

  let tamperingDetected = false;

  for(let i = 0; i < readings.length - 1; i++){
    if(readings[i] < readings[i + 1]){
      tamperingDetected = true;
    }
  }

  let historyHtml = "<h3>سجل العدادات</h3>";

  (historyData || []).forEach(item => {
    historyHtml += `<p>${item.mileage} كم</p>`;
  });

  let warningHtml = tamperingDetected
    ? `<p class="warning">⚠️ يوجد اشتباه تلاعب بالعداد</p>`
    : `<p class="good">✅ لا يوجد اشتباه واضح حاليًا</p>`;

  result.innerHTML = `
    <h3>نتيجة البحث</h3>
    <p><strong>الشركة:</strong> ${car.make}</p>
    <p><strong>الموديل:</strong> ${car.model}</p>
    <p><strong>السنة:</strong> ${car.year}</p>
    <p><strong>العداد الحالي:</strong> ${car.mileage}</p>
    ${historyHtml}
    ${warningHtml}
  `;
}
</script>

</body>
</html>
