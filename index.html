<script>
  const SUPABASE_URL = "https://fufghmrctxaiwnchgatp.supabase.co";
  const SUPABASE_KEY = "sb_publishable_VMe1tBu15thlUKhijxGeiA_M_6rX4fV";

  const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  function normalizeLogin(value){
    value = value.trim();
    if(!value.includes("@")) return value + "@odotrust.local";
    return value;
  }

  function cleanVin(value){
    return value.trim().toUpperCase();
  }

  function getReadingDate(item){
    return item.inspection_date || item.created_at || "";
  }

  function sortHistory(historyData){
    return (historyData || [])
      .filter(item => Number(item.mileage) > 0)
      .sort((a,b) => {
        const dateA = new Date(getReadingDate(a)).getTime() || 0;
        const dateB = new Date(getReadingDate(b)).getTime() || 0;

        if(dateA !== dateB) return dateA - dateB;

        return Number(a.id || 0) - Number(b.id || 0);
      });
  }

  function analyzeMileage(car, historyData){
    const validHistory = sortHistory(historyData);
    const readings = validHistory.map(item => Number(item.mileage));

    if(readings.length === 0 && Number(car.mileage || 0) > 0){
      readings.push(Number(car.mileage || 0));
    }

    const currentMileage = readings.length
      ? readings[readings.length - 1]
      : Number(car.mileage || 0);

    const minMileage = readings.length ? Math.min(...readings) : currentMileage;
    const maxMileage = readings.length ? Math.max(...readings) : currentMileage;

    const drops = [];
    const movements = [];

    for(let i = 1; i < readings.length; i++){
      const from = readings[i - 1];
      const to = readings[i];
      const diff = to - from;

      if(diff < 0){
        drops.push({
          step:i + 1,
          from,
          to,
          amount:Math.abs(diff)
        });
      }

      movements.push({
        step:i + 1,
        from,
        to,
        diff,
        type:diff < 0 ? "down" : diff > 0 ? "up" : "same"
      });
    }

    const dropCount = drops.length;

    let biggestDrop = {
      amount:0,
      from:0,
      to:0
    };

    drops.forEach(drop => {
      if(drop.amount > biggestDrop.amount){
        biggestDrop = drop;
      }
    });

    let riskLevel = "unknown";
    let riskScore = 30;
    let statusText = "البيانات غير كافية لإصدار حكم واضح";
    let statusClass = "medium";

    if(dropCount > 0){
      riskLevel = "high";
      riskScore = Math.min(98, 85 + dropCount * 3);
      statusText = "يوجد اشتباه تلاعب بالعداد";
      statusClass = "warning";
    }else if(readings.length <= 1){
      riskLevel = "medium";
      riskScore = 40;
      statusText = "البيانات محدودة وتحتاج إلى قراءات إضافية";
      statusClass = "medium";
    }else{
      riskLevel = "low";
      riskScore = 10;
      statusText = "لا يوجد اشتباه واضح في التلاعب";
      statusClass = "safe";
    }

    return {
      validHistory,
      readings,
      movements,
      drops,
      dropCount,
      biggestDrop,
      minMileage,
      maxMileage,
      currentMileage,
      riskLevel,
      riskScore,
      statusText,
      statusClass
    };
  }

  function buildWebTimeline(analysis){
    if(!analysis.readings.length){
      return "<p>لا توجد قراءات كافية لعرض مسار العداد.</p>";
    }

    let html = `<div class="mini-path">`;

    analysis.readings.forEach((mileage, index) => {
      if(index > 0){
        const previous = analysis.readings[index - 1];
        html += mileage < previous
          ? `<span class="mini-down">↓</span>`
          : `<span class="mini-up">↑</span>`;
      }

      html += `<span class="mini-chip">${mileage.toLocaleString()} كم</span>`;
    });

    html += `</div>`;

    if(analysis.dropCount > 0){
      html += `
        <p style="color:#fca5a5;font-weight:bold;">
          تم رصد ${analysis.dropCount} انخفاض غير طبيعي. أكبر انخفاض من
          ${analysis.biggestDrop.from.toLocaleString()} كم إلى
          ${analysis.biggestDrop.to.toLocaleString()} كم.
        </p>
      `;
    }

    return html;
  }

  async function signUp(){
    const email = normalizeLogin(document.getElementById("email").value);
    const password = document.getElementById("password").value;
    const authMessage = document.getElementById("authMessage");

    const { error } = await client.auth.signUp({ email, password });

    if(error){
      authMessage.innerText = error.message;
      authMessage.style.color = "#f87171";
    }else{
      authMessage.innerText = "تم إنشاء الحساب ✅";
      authMessage.style.color = "#4ade80";
    }
  }

  async function signIn(){
    const email = normalizeLogin(document.getElementById("email").value);
    const password = document.getElementById("password").value;
    const authMessage = document.getElementById("authMessage");

    const { error } = await client.auth.signInWithPassword({ email, password });

    if(error){
      authMessage.innerText = error.message;
      authMessage.style.color = "#f87171";
    }else{
      authMessage.innerText = "تم تسجيل الدخول ✅";
      authMessage.style.color = "#4ade80";
      checkUser();
    }
  }

  async function logout(){
    await client.auth.signOut();
    document.getElementById("authMessage").innerText = "تم تسجيل الخروج 👋";
    checkUser();
  }

  async function saveVehicle(){
    const vin = cleanVin(document.getElementById("vin").value);
    const make = document.getElementById("make").value.trim();
    const model = document.getElementById("model").value.trim();
    const year = Number(document.getElementById("year").value);
    const mileage = Number(document.getElementById("mileage").value);
    const imageFile = document.getElementById("image").files[0];
    const message = document.getElementById("message");

    if(!vin || vin.length < 8 || !make || !model || !year || !mileage){
      message.innerText = "أكمل بيانات المركبة أولاً";
      message.style.color = "#f87171";
      return;
    }

    const { data:{ user } } = await client.auth.getUser();

    if(!user){
      message.innerText = "يجب تسجيل الدخول أولاً";
      message.style.color = "#f87171";
      return;
    }

    let imageUrl = "";

    if(imageFile){
      try{
        const fileExt = imageFile.name.split(".").pop();
        const fileName = "public/" + Date.now() + "." + fileExt;
        await client.storage.from("cars").upload(fileName, imageFile);
        const { data } = client.storage.from("cars").getPublicUrl(fileName);
        imageUrl = data.publicUrl;
      }catch(e){
        imageUrl = "";
      }
    }

    const { error } = await client.from("vehicles").insert([{
      vin,
      make,
      model,
      year,
      mileage,
      user_id:user.id,
      image_url:imageUrl
    }]);

    await client.from("mileage_history").insert([{
      vin,
      mileage,
      inspection_date:new Date().toISOString().slice(0,10),
      source:"manual"
    }]);

    if(error){
      message.innerText = error.message;
      message.style.color = "#f87171";
    }else{
      message.innerText = "تم حفظ المركبة ✅";
      message.style.color = "#4ade80";
      checkUser();
    }
  }

  async function getCarAndHistory(vin){
    const { data: cars, error } = await client
      .from("vehicles")
      .select("*")
      .eq("vin", vin)
      .order("created_at", { ascending:false })
      .limit(20);

    if(error || !cars || cars.length === 0) return null;

    const car = cars
      .filter(c => c.make && c.model && Number(c.mileage) > 0)
      .sort((a,b) => Number(b.mileage) - Number(a.mileage))[0] || cars[0];

    const { data: historyData } = await client
      .from("mileage_history")
      .select("*")
      .eq("vin", vin)
      .order("created_at", { ascending:true });

    return { car, historyData: historyData || [] };
  }

  async function searchVehicle(){
    const searchVin = cleanVin(document.getElementById("searchVin").value);
    const result = document.getElementById("result");

    if(!searchVin){
      result.innerHTML = "أدخل رقم الشاصي أولاً";
      return;
    }

    const found = await getCarAndHistory(searchVin);

    if(!found){
      result.innerHTML = "لا توجد مركبة";
      return;
    }

    const { car, historyData } = found;
    const analysis = analyzeMileage(car, historyData);
    const webTimeline = buildWebTimeline(analysis);

    result.innerHTML = `
      <div class="info-card">
        <h2>🚗 نتيجة الفحص</h2>
        <p><strong>رقم الهيكل VIN:</strong> ${car.vin}</p>
        <p><strong>الشركة:</strong> ${car.make || "غير محدد"}</p>
        <p><strong>الموديل:</strong> ${car.model || "غير محدد"}</p>
        <p><strong>السنة:</strong> ${car.year || "غير محدد"}</p>
        <p><strong>العداد الحالي:</strong> ${analysis.currentMileage.toLocaleString()} كم</p>
        <p><strong>درجة الخطورة:</strong> ${analysis.riskScore} / 100</p>

        <h3>مسار العداد الزمني</h3>
        ${webTimeline}

        <div class="${analysis.statusClass}">${analysis.statusText}</div>
      </div>
    `;
  }

    const graphReadings = analysis.readings.length

    const graphWidth = 780;

    const points = graphReadings.map((value, index) => {

.grid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:8px;
}

.item{
  background:white;
  border:1px solid #e2e8f0;
  border-radius:11px;
  padding:9px;
}

.label{
  color:#64748b;
  font-size:11px;
  margin-bottom:3px;
}

.value{
  font-size:15px;
  font-weight:bold;
}

.status{
  background:${statusColor} !important;
  color:white !important;
  padding:13px;
  border-radius:13px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
  margin-bottom:9px;
}

.summary{
  display:grid;
  grid-template-columns:repeat(4, 1fr);
  gap:8px;
}

.summary-card{
  background:#ffffff;
  border:1px solid #e2e8f0;
  border-radius:12px;
  padding:9px;
  text-align:center;
}

.summary-value{
  font-size:20px;
  font-weight:800;
  color:#0f172a;
  line-height:1.2;
}

.summary-label{
  font-size:11px;
  color:#475569;
  margin-top:3px;
}

.odometer-chart{
  width:100%;
  height:190px;
  display:block;
  margin-top:5px;
}

.legend{
  display:flex;
  gap:12px;
  justify-content:center;
  font-size:12px;
  color:#475569;
  margin-top:3px;
}

.legend span{
  display:inline-flex;
  align-items:center;
  gap:4px;
}

.up-dot,.down-dot,.current-dot{
  width:12px;
  height:12px;
  border-radius:99px;
  display:inline-block;
}

.up-dot{ background:#15803d; }
.down-dot{ background:#b91c1c; }
.current-dot{ background:#2563eb; }

.drop-row{
  background:#fee2e2;
  border-right:5px solid #b91c1c;
  color:#7f1d1d;
  padding:8px 10px;
  border-radius:10px;
  margin-bottom:6px;
  display:flex;
  justify-content:space-between;
  gap:8px;
  font-size:12px;
}

.safe-note{
  background:#dcfce7;
  color:#166534;
  padding:10px;
  border-radius:10px;
  font-weight:bold;
}

.note{
  color:#475569;
  font-size:11px;
  line-height:1.6;
  margin:6px 0 0;
}
</style>
</head>

<body>

<div class="header">
  <img src="logo.png" class="logo">
  <h1>تقرير فحص المركبة - OdoTrust</h1>
  <div class="subtitle">Vehicle Inspection Report</div>
  <div class="subtitle">تاريخ التقرير: ${reportDate}</div>
</div>

<div class="box">
  <h2>بيانات المركبة <span class="en">Vehicle Details</span></h2>
  <div class="grid">
    <div class="item">
      <div class="label">رقم الهيكل VIN</div>
      <div class="value">${car.vin}</div>
    </div>
    <div class="item">
      <div class="label">الشركة Make</div>
      <div class="value">${car.make || "غير محدد"}</div>
    </div>
    <div class="item">
      <div class="label">الموديل Model</div>
      <div class="value">${car.model || "غير محدد"}</div>
    </div>
    <div class="item">
      <div class="label">السنة Year</div>
      <div class="value">${car.year || "غير محدد"}</div>
    </div>
    <div class="item">
      <div class="label">آخر قراءة مسجلة</div>
      <div class="value">${analysis.currentMileage.toLocaleString()} كم</div>
    </div>
    <div class="item">
      <div class="label">عدد القراءات</div>
      <div class="value">${analysis.readings.length}</div>
    </div>
  </div>
</div>

<div class="box">
  <h2>نتيجة الفحص <span class="en">Inspection Result</span></h2>
  <div class="status">${analysis.statusText}</div>
  <div class="summary">
    <div class="summary-card">
      <div class="summary-value">${analysis.riskScore} / 100</div>
      <div class="summary-label">درجة الخطورة</div>
    </div>
    <div class="summary-card">
      <div class="summary-value">${riskLabel}</div>
      <div class="summary-label">مستوى الخطورة</div>
    </div>
    <div class="summary-card">
      <div class="summary-value">${analysis.maxMileage.toLocaleString()} كم</div>
      <div class="summary-label">أعلى قراءة</div>
    </div>
    <div class="summary-card">
      <div class="summary-value">${analysis.dropCount}</div>
      <div class="summary-label">مرات الانخفاض</div>
    </div>
  </div>
</div>

<div class="box">
  <h2>مؤشر حركة العداد <span class="en">Odometer Movement Indicator</span></h2>
  ${odometerChartHtml}
  <div class="legend">
    <span><i class="up-dot"></i> ارتفاع طبيعي</span>
    <span><i class="down-dot"></i> انخفاض مشبوه</span>
    <span><i class="current-dot"></i> آخر قراءة</span>
  </div>
  <p class="note">${timelineSummary}</p>
</div>

<div class="box">
  <h2>تفاصيل الانخفاضات غير الطبيعية <span class="en">Suspicious Drops</span></h2>
  ${dropDetailsHtml}
</div>

<div class="box">
  <h2>التوصية <span class="en">Recommendation</span></h2>
  <p>${recommendation}</p>
</div>

<p class="note">
ملاحظة: هذا التقرير يعتمد على البيانات المتوفرة داخل النظام، ولا يغني عن الفحص الفني للمركبة أو التحقق من السجلات الرسمية قبل الشراء.
</p>

</body>
</html>
`);

    w.document.title = "OdoTrust_Report";
    w.focus();
    setTimeout(() => w.print(), 700);
  }

  async function editCar(id){
    const newMileage = prompt("أدخل العداد الجديد");
    if(!newMileage) return;

    await client.from("vehicles").update({ mileage:Number(newMileage) }).eq("id", id);
    checkUser();
  }

  async function deleteCar(id){
    const ok = confirm("هل تريد حذف المركبة؟");
    if(!ok) return;

    await client.from("vehicles").delete().eq("id", id);
    checkUser();
  }

  async function checkUser(){
    const { data:{ user } } = await client.auth.getUser();
    const userStatus = document.getElementById("userStatus");
    const savedCars = document.getElementById("savedCars");

    if(!user){
      userStatus.innerHTML = "❌ لا يوجد مستخدم مسجل دخول";
      savedCars.innerHTML = "لا توجد مركبات";
      return;
    }

    userStatus.innerHTML = "✅ مسجل دخول: " + user.email;

    const { data: cars } = await client
      .from("vehicles")
      .select("*")
      .eq("user_id", user.id)
      .order("id", { ascending:false });

    if(!cars || cars.length === 0){
      savedCars.innerHTML = "لا توجد مركبات";
      return;
    }

    let html = "";

    cars.forEach(car => {
      html += `
        <div class="info-card">
          <img
            src="${car.image_url || 'https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=1200&auto=format&fit=crop'}"
            style="width:100%;height:220px;object-fit:cover;border-radius:18px;margin-bottom:15px;"
            alt="صورة المركبة"
          >
          <p>🚗 ${car.make || ""} ${car.model || ""}</p>
          <p>📅 ${car.year || "غير محدد"}</p>
          <p>📍 ${car.vin || "غير محدد"}</p>
          <p>📊 ${Number(car.mileage || 0).toLocaleString()} كم</p>
          <button onclick="editCar(${car.id})">تعديل المركبة</button>
          <button onclick="deleteCar(${car.id})">حذف المركبة</button>
        </div>
      `;
    });

    savedCars.innerHTML = html;
  }

  checkUser();
</script>

</body>
</html>
